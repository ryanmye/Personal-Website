<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title %}{{ page.title }} &mdash; {% endif %}{{ site.title }}</title>
<meta name="description" content="{% if page.description %}{{ page.description }}{% elsif page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
<meta name="author" content="{{ site.author }}">
<link rel="canonical" href="{{ page.url | absolute_url }}">
{% feed_meta %}

<!-- Anti-AI/crawler directives -->
<meta name="robots" content="noai, noimageai">
<meta name="tdm-reservation" content="1">

<!-- Open Graph -->
<meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
<meta property="og:description" content="{% if page.description %}{{ page.description }}{% elsif page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
<meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:site_name" content="{{ site.title }}">
<meta property="og:image" content="{% if page.images and page.images.size > 0 %}{{ page.images[0].src | absolute_url }}{% else %}{{ '/assets/images/headshot.jpeg' | absolute_url }}{% endif %}">
{% if page.layout == 'post' %}
<meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}">
<meta property="article:author" content="{{ site.author }}">
{% for tag in page.tags %}<meta property="article:tag" content="{{ tag }}">
{% endfor %}{% endif %}

<!-- Twitter Card -->
<meta name="twitter:card" content="summary">
{% if site.twitter_username %}<meta name="twitter:site" content="@{{ site.twitter_username }}">{% endif %}
<meta name="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
<meta name="twitter:description" content="{% if page.description %}{{ page.description }}{% elsif page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
<meta name="twitter:image" content="{% if page.images and page.images.size > 0 %}{{ page.images[0].src | absolute_url }}{% else %}{{ '/assets/images/headshot.jpeg' | absolute_url }}{% endif %}">

<!-- Stylesheet (preload for critical path) -->
<link rel="preload" href="{{ '/assets/css/styles.css' | relative_url }}?v={{ site.time | date: '%s' }}" as="style">
<link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}?v={{ site.time | date: '%s' }}">

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- Font Awesome (deferred, non-blocking) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer"></noscript>

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">

<!-- Structured data (JSON-LD) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "@id": "{{ site.url }}{{ site.baseurl }}/#website",
  "name": "{{ site.title }}",
  "description": "{{ site.description }}",
  "url": "{{ site.url }}{{ site.baseurl }}/",
  "author": {
    "@type": "Person",
    "@id": "{{ site.url }}{{ site.baseurl }}/#ryan-ye",
    "name": "{{ site.author }}"
  }
}
</script>
{% if page.url == '/' %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "@id": "{{ site.url }}{{ site.baseurl }}/#ryan-ye",
  "name": "{{ site.author }}",
  "url": "{{ site.url }}{{ site.baseurl }}/",
  "email": "{{ site.email }}",
  "image": "{{ '/assets/images/headshot.jpeg' | absolute_url }}",
  "jobTitle": "Undergraduate Computer Science Student",
  "description": "{{ site.description }}",
  "memberOf": {
    "@type": "CollegeOrUniversity",
    "@id": "https://www.cornell.edu",
    "name": "Cornell University",
    "url": "https://www.cornell.edu"
  },
  "affiliation": {
    "@type": "CollegeOrUniversity",
    "@id": "https://www.cornell.edu",
    "name": "Cornell University",
    "url": "https://www.cornell.edu"
  },
  "knowsAbout": [
    "Machine Learning",
    "Computer Vision",
    "Deep Learning",
    "Artificial Intelligence",
    "Animal Behavior Analysis",
    "Cornell University",
    "Computer Science"
  ],
  "sameAs": [
    "https://github.com/{{ site.github_username }}",
    "https://linkedin.com/in/{{ site.linkedin_username }}",
    "https://twitter.com/{{ site.twitter_username }}"{% if site.data.research.google_scholar %},
    "{{ site.data.research.google_scholar }}"{% endif %}
  ]
}
</script>
{% endif %}

<!-- Apply saved theme immediately to prevent flash of wrong theme -->
<script>
(function(){var t=localStorage.getItem('theme');if(!t)return;var m={warm:{'--bg':'#FAF5EE','--surface':'#FFFFFF','--border':'#E6D9C8','--text':'#2A1F16','--muted':'#7A6555','--accent':'#A0603C','--accent-soft':'#F5E6DC','--accent-dark':'#9E5A40','--color-code-bg':'#F5E6DC','--color-code-text':'#2A1F16','--theme-dot-border':'transparent'},linen:{'--bg':'#F8F5F1','--surface':'#FFFFFF','--border':'#DDD6CE','--text':'#2A2218','--muted':'#7A6C5E','--accent':'#5C4F43','--accent-soft':'#EDE6DC','--accent-dark':'#3A2E24','--color-code-bg':'#EDE6DC','--color-code-text':'#2A2218','--theme-dot-border':'transparent'},pure:{'--bg':'#F7F7F7','--surface':'#FFFFFF','--border':'#E0E0E0','--text':'#111111','--muted':'#6E6E6E','--accent':'#111111','--accent-soft':'#EBEBEB','--accent-dark':'#333333','--color-code-bg':'#EBEBEB','--color-code-text':'#111111','--theme-dot-border':'transparent'},barely:{'--bg':'#242220','--surface':'#2E2B28','--border':'#383430','--text':'#EDE8E2','--muted':'#A0958C','--accent':'#B89A7D','--accent-soft':'#35302B','--accent-dark':'#D4B896','--color-code-bg':'#35302B','--color-code-text':'#EDE8E2','--theme-dot-border':'transparent'},'dark-mono':{'--bg':'#181818','--surface':'#222222','--border':'#2E2E2E','--text':'#E8E8E8','--muted':'#999999','--accent':'#E8E8E8','--accent-soft':'#2A2A2A','--accent-dark':'#AAAAAA','--color-code-bg':'#2A2A2A','--color-code-text':'#E8E8E8','--theme-dot-border':'#555555'}};var v=m[t];if(!v)return;var r=document.documentElement.style;for(var k in v)r.setProperty(k,v[k]);})();
</script>
