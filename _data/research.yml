# Research information
subtitle: "Computer vision, machine learning, and AI for scientific discovery."
google_scholar: "https://scholar.google.com/citations?user=RhqHy9sAAAAJ&hl=en"

position:
  title: "AI for Animal Behavior Monitoring - Accepted to ADSA Poster!"
  role: "Undergraduate Researcher"
  lab: "Sun Lab (PI: Jennifer Sun)"
  institution: "Cornell University"
  description: |
    I work on scalable computer vision systems for analyzing dairy calf behavior in
    agricultural environments. This work is part of a broader effort to support veterinary
    researchers studying early indicators of disease and welfare.
  focus:
    - title: "Pose classification using self-supervised visual features"
      detail: "extracting features from pretrained DINO vision models and training lightweight classifiers for posture recognition"
    - title: "Object detection for livestock monitoring"
      detail: "fine-tuning YOLO models on a self-annotated dataset of dairy calves"
    - title: "Evaluating visual-language models (VLMs)"
      detail: "testing models for pose recognition and eartag identification in farm environments"
    - title: "Building research tools"
      detail: "packaging the pipeline into an interactive Jupyter workflow so veterinary researchers can easily run experiments and analyze data"
  note: "Conducted as part of the Bowers Undergraduate Research Experience (BURE) with support from a CIDA grant."

publications:
  - title: "Effects of Firm Performance on CEO Compensation Before and During COVID-19"
    authors: "Ryan Ye — Primary Author"
    venue: "Research in Economics, 2023"
    description: "This research analyzed how firm performance influenced CEO compensation structures before and during the COVID-19 pandemic, with a focus on changes in pay ratios and incentive alignment."
    tags: ["Economics", "CEO Compensation", "COVID-19"]

interests:
  - "Machine learning and computer vision — deep learning systems for real-world perception tasks"
  - "AI for science — using ML to accelerate research in biology, agriculture, and medicine"
  - "Representation learning — self-supervised and foundation models (DINO, VLMs)"
  - "Data-efficient learning — methods that work well with limited labeled data"
